<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 备忘录系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
    }

    .container {
      max-width: 400px;
      margin: 100px auto;
      background-color: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      color: #666;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background-color: #45a049;
    }

    .error-message {
      color: red;
      margin-top: 10px;
      text-align: center;
    }

    .success-message {
      color: green;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>备忘录系统</h2>
  <form id="loginForm">
    <div class="form-group">
      <label for="username">用户名</label>
      <input type="text" id="username" name="username" placeholder="请输入用户名">
    </div>
    <div class="form-group">
      <label for="password">密码</label>
      <input type="password" id="password" name="password" placeholder="请输入密码">
    </div>
    <button type="button" onclick="login()">登录</button>
    <button type="button" onclick="register()" style="margin-top: 10px; background-color: #2196F3;">注册</button>
    <div id="message" class="error-message"></div>
  </form>
</div>

<script>
  // 登录函数
  function login() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const message = document.getElementById('message');

    // 简单验证
    if (!username || !password) {
      message.textContent = '用户名和密码不能为空';
      return;
    }

    // 发送登录请求
    fetch('http://localhost:8081/api/user/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ username, password })
    })
            .then(response => response.json())
            .then(data => {
              if (data.success) {
                // 登录成功，保存用户信息到本地存储
                localStorage.setItem('user', JSON.stringify(data.data));
                // 跳转到首页
                window.location.href = 'index.html';
              } else {
                message.textContent = data.message;
              }
            })
            .catch(error => {
              message.textContent = '登录失败：' + error.message;
            });
  }

  // 注册函数
  function register() {
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const message = document.getElementById('message');

    // 简单验证
    if (!username || !password) {
      message.textContent = '用户名和密码不能为空';
      return;
    }

    // 发送注册请求
    fetch('http://localhost:8081/api/user/register', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ username, password })
    })
            .then(response => response.json())
            .then(data => {
              if (data.success) {
                message.className = 'success-message';
                message.textContent = '注册成功，请登录';
              } else {
                message.className = 'error-message';
                message.textContent = data.message;
              }
            })
            .catch(error => {
              message.className = 'error-message';
              message.textContent = '注册失败：' + error.message;
            });
  }
</script>
</body>
</html>
